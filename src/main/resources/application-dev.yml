spring:
  datasource:
    url: jdbc:h2:mem:bets;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    locations: classpath:db/migration,classpath:db/dev

management:
  metrics:
    tags:
      application: bet-task-dev
