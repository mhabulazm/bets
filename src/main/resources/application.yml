spring:
  profiles:
    default: dev
    group:
      stg: external-db
      prod: external-db
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: bet-task-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sporty.bettask.domain
        spring.json.value.default.type: com.sporty.bettask.domain.EventOutcomeMessage

server:
  port: 8080

app:
  kafka:
    event-outcomes-topic: event-outcomes
    publish-timeout-seconds: 5
  rocketmq:
    bet-settlements-topic: bet-settlements

logging:
  level:
    com.sporty.bettask: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: bet-task
