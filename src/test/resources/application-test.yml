spring:
  datasource:
    url: jdbc:h2:mem:bet-task-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/testdata
  kafka:
    consumer:
      group-id: bet-task-test-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.sporty.bettask.domain
        spring.json.value.default.type: com.sporty.bettask.domain.EventOutcomeMessage
    listener:
      missing-topics-fatal: false

app:
  kafka:
    event-outcomes-topic: event-outcomes-test
  rocketmq:
    bet-settlements-topic: bet-settlements

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: bet-task-test

logging:
  level:
    root: WARN
    com.sporty.bettask: INFO
